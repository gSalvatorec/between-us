<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Between Us — Confirmando tu cuenta</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0D0F1A;
      color: #E8E8F0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #161826;
      border: 0.5px solid #2A2D45;
      border-radius: 24px;
      padding: 48px 36px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }

    .logo { font-size: 56px; margin-bottom: 20px; }

    .app-name {
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #8B8FA8;
      margin-bottom: 8px;
    }

    h1 {
      font-size: 26px;
      font-weight: 300;
      font-style: italic;
      color: #F0EEF8;
      margin-bottom: 12px;
      line-height: 1.3;
    }

    .subtitle {
      font-size: 14px;
      color: #8B8FA8;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px 20px;
      border-radius: 14px;
      margin-bottom: 28px;
      font-size: 14px;
      font-weight: 500;
    }

    .status.loading {
      background: rgba(232, 146, 124, 0.1);
      border: 1px solid rgba(232, 146, 124, 0.25);
      color: #E8927C;
    }

    .status.success {
      background: rgba(72, 199, 142, 0.1);
      border: 1px solid rgba(72, 199, 142, 0.25);
      color: #48C78E;
    }

    .status.error {
      background: rgba(241, 85, 85, 0.1);
      border: 1px solid rgba(241, 85, 85, 0.25);
      color: #F15555;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(232, 146, 124, 0.3);
      border-top-color: #E8927C;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: opacity 0.2s;
      margin-bottom: 12px;
    }

    .btn:active { opacity: 0.8; }

    .btn-primary {
      background: linear-gradient(135deg, #E8927C, #D4A96A);
      color: #0D0F1A;
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid #2A2D45;
      color: #8B8FA8;
      font-size: 13px;
    }

    .hidden { display: none; }

    .divider {
      font-size: 12px;
      color: #4A4D65;
      margin: 16px 0;
    }

    .steps {
      text-align: left;
      background: #1A1D2E;
      border-radius: 14px;
      padding: 20px;
      margin-top: 16px;
    }

    .step {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }

    .step:last-child { margin-bottom: 0; }

    .step-num {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: rgba(232, 146, 124, 0.15);
      color: #E8927C;
      font-size: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .step-text {
      font-size: 13px;
      color: #8B8FA8;
      line-height: 1.5;
      padding-top: 3px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🪺</div>
    <p class="app-name">Between Us</p>
    <h1 id="title">Confirmando tu cuenta...</h1>
    <p class="subtitle" id="subtitle">Un momento mientras verificamos tu correo.</p>

    <!-- Estado -->
    <div class="status loading" id="status">
      <div class="spinner"></div>
      <span id="status-text">Procesando...</span>
    </div>

    <!-- Botón principal (oculto hasta confirmar) -->
    <a href="#" class="btn btn-primary hidden" id="btn-open" onclick="openApp()">
      Abrir Between Us →
    </a>

    <!-- Alternativa manual -->
    <div class="hidden" id="manual-section">
      <p class="divider">¿No se abrió la app?</p>
      <button class="btn btn-secondary" onclick="openApp()">
        Intentar de nuevo
      </button>
      <div class="steps">
        <div class="step">
          <div class="step-num">1</div>
          <p class="step-text">Asegúrate de tener <strong>Between Us</strong> instalada</p>
        </div>
        <div class="step">
          <div class="step-num">2</div>
          <p class="step-text">Toca "Intentar de nuevo" o abre la app manualmente</p>
        </div>
        <div class="step">
          <div class="step-num">3</div>
          <p class="step-text">Inicia sesión con tu email y contraseña</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const APP_SCHEME = 'betweenusnido'

    function getParams() {
      // Supabase puede pasar params en el hash (#) o en el query string (?)
      const hash   = window.location.hash.substring(1)
      const search = window.location.search.substring(1)
      const params = new URLSearchParams(hash || search)
      return {
        accessToken:  params.get('access_token'),
        refreshToken: params.get('refresh_token'),
        tokenHash:    params.get('token_hash'),
        type:         params.get('type') || 'signup',
        error:        params.get('error'),
        errorDesc:    params.get('error_description'),
      }
    }

    function setStatus(type, text) {
      const el = document.getElementById('status')
      const textEl = document.getElementById('status-text')
      el.className = `status ${type}`
      textEl.textContent = text

      if (type !== 'loading') {
        // Quitar spinner
        el.querySelector('.spinner')?.remove()
      }
    }

    let deepLinkUrl = ''

    function openApp() {
      if (deepLinkUrl) {
        window.location.href = deepLinkUrl
      }
    }

    function showOpenButton() {
      document.getElementById('btn-open').classList.remove('hidden')
      document.getElementById('manual-section').classList.remove('hidden')
    }

    async function handleConfirmation() {
      const p = getParams()

      if (p.error) {
        document.getElementById('title').textContent = 'Enlace inválido'
        document.getElementById('subtitle').textContent = p.errorDesc || 'Este enlace ya fue usado o expiró.'
        setStatus('error', 'No pudimos confirmar tu cuenta')
        return
      }

      if (p.accessToken && p.refreshToken) {
        // Tiene tokens — redirigir a la app con los tokens
        deepLinkUrl = `${APP_SCHEME}://auth/callback#access_token=${p.accessToken}&refresh_token=${p.refreshToken}&type=${p.type}`

        document.getElementById('title').textContent = '¡Cuenta confirmada!'
        document.getElementById('subtitle').textContent = 'Tu email fue verificado. Ahora puedes iniciar sesión en Between Us.'
        setStatus('success', '✓ Email verificado correctamente')

        showOpenButton()

        // Intentar abrir automáticamente
        setTimeout(() => { window.location.href = deepLinkUrl }, 800)

      } else if (p.tokenHash) {
        // Token hash — redirigir a la app para que Supabase lo procese
        deepLinkUrl = `${APP_SCHEME}://auth/callback?token_hash=${p.tokenHash}&type=${p.type}`

        document.getElementById('title').textContent = '¡Cuenta confirmada!'
        document.getElementById('subtitle').textContent = 'Tu email fue verificado. Toca el botón para entrar a Between Us.'
        setStatus('success', '✓ Email verificado correctamente')

        showOpenButton()
        setTimeout(() => { window.location.href = deepLinkUrl }, 800)

      } else {
        // Sin parámetros válidos
        document.getElementById('title').textContent = 'Enlace incompleto'
        document.getElementById('subtitle').textContent = 'Revisa tu correo y usa el enlace más reciente.'
        setStatus('error', 'No encontramos los datos de confirmación')
      }
    }

    handleConfirmation()
  </script>
</body>
</html>
